services:
  - type: web
    name: hopdot-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ORS_API_KEY
        sync: false          # set in Render dashboard
      - key: ALLOWED_ORIGIN
        value: https://<your-vercel-app>.vercel.app
